<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
    <div class="container">

        <!-- Logo -->
        <a class="navbar-brand fw-bold text-primary fs-4" routerLink="/">
            <i class="bi bi-briefcase-fill me-2"></i>WorkBridge
        </a>

        <!-- Hamburger -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Links -->
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" routerLink="/" routerLinkActive="active"
                        [routerLinkActiveOptions]="{exact:true}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" routerLink="/jobs" routerLinkActive="active">Jobs</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" routerLink="/gigs" routerLinkActive="active">Gigs</a>
                </li>
            </ul>

            <!-- Auth buttons -->
            <div class="d-flex gap-2 align-items-center">

                <!-- Not logged in -->
                <ng-container *ngIf="!auth.isLoggedIn()">
                    <a routerLink="/login" class="btn btn-outline-primary btn-sm">Login</a>
                    <a routerLink="/register" class="btn btn-primary btn-sm">Register</a>
                </ng-container>

                <!-- Logged in -->
                <ng-container *ngIf="auth.isLoggedIn()">
                    <a routerLink="/dashboard" class="btn btn-outline-primary btn-sm">
                        <img [src]="auth.getCurrentUser()?.profileImage || 'https://i.pravatar.cc/32'"
                                class="rounded-circle border me-1" width="24" height="24"
                                onerror="this.src='https://i.pravatar.cc/32'">Dashboard
                    </a>
                    <a *ngIf="auth.isAdmin()" routerLink="/admin" class="btn btn-outline-danger btn-sm">
                        <i class="bi bi-shield me-1"></i>Admin
                    </a>
                    <button (click)="logout()" class="btn btn-danger btn-sm">
                        <i class="bi bi-box-arrow-right me-1"></i>Logout
                    </button>
                </ng-container>

            </div>
        </div>
    </div>
</nav>

<!-- Spacer so content doesn't hide under fixed navbar -->
<div style="height: 70px;"></div>

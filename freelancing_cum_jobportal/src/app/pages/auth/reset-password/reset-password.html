<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
    <div class="card shadow-sm border-0 text-center p-4 w-100" style="max-width: 400px; border-radius: 16px;">

        <!-- Success -->
        <div *ngIf="submitted">
            <div class="text-success mb-3" style="font-size: 64px;">
                <i class="bi bi-shield-check-fill"></i>
            </div>
            <h5 class="fw-bold">Password Reset!</h5>
            <p class="text-muted small">Your password has been updated successfully.</p>
            <a routerLink="/login" class="btn btn-primary btn-sm">Go to Login</a>
        </div>

        <!-- Form -->
        <div *ngIf="!submitted">
            <div class="text-primary mb-3" style="font-size: 48px;">
                <i class="bi bi-shield-lock"></i>
            </div>
            <h5 class="fw-bold">Reset Password</h5>
            <p class="text-muted small mb-4">Enter your new password below</p>

            <form [formGroup]="form" (ngSubmit)="onSubmit()">
                <div class="mb-3 text-start">
                    <label class="form-label small fw-semibold">New Password</label>
                    <input formControlName="newPassword" type="password" class="form-control"
                        placeholder="Min 6 characters">
                    <div *ngIf="form.get('newPassword')?.touched && form.get('newPassword')?.invalid"
                        class="text-danger small mt-1">Min 6 characters required</div>
                </div>
                <div class="mb-4 text-start">
                    <label class="form-label small fw-semibold">Confirm Password</label>
                    <input formControlName="confirmPassword" type="password" class="form-control"
                        placeholder="Repeat password">
                    <div *ngIf="form.get('confirmPassword')?.touched && !passwordsMatch()"
                        class="text-danger small mt-1">Passwords do not match</div>
                </div>
                <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
                    <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                    {{ loading ? 'Resetting...' : 'Reset Password' }}
                </button>
            </form>
        </div>

    </div>
</div>

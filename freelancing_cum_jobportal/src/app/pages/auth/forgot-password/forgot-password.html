<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
    <div class="card shadow-sm border-0 text-center p-4 w-100" style="max-width: 400px; border-radius: 16px;">

        <!-- Success state -->
        <div *ngIf="submitted">
            <div class="text-success mb-3" style="font-size: 64px;">
                <i class="bi bi-check-circle-fill"></i>
            </div>
            <h5 class="fw-bold">Reset Link Sent!</h5>
            <p class="text-muted small">Check your email for the reset link.</p>
            <a routerLink="/login" class="btn btn-outline-primary btn-sm">Back to Login</a>
        </div>

        <!-- Form state -->
        <div *ngIf="!submitted">
            <div class="text-primary mb-3" style="font-size: 48px;">
                <i class="bi bi-lock"></i>
            </div>
            <h5 class="fw-bold">Forgot Password?</h5>
            <p class="text-muted small mb-4">Enter your email and we'll send a reset link</p>

            <form [formGroup]="form" (ngSubmit)="onSubmit()">
                <div class="mb-3 text-start">
                    <label class="form-label small fw-semibold">Email</label>
                    <input formControlName="email" type="email" class="form-control" placeholder="ahmed@email.com">
                    <div *ngIf="form.get('email')?.touched && form.get('email')?.invalid"
                        class="text-danger small mt-1">Valid email is required</div>
                </div>
                <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
                    <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                    {{ loading ? 'Sending...' : 'Send Reset Link' }}
                </button>
            </form>

            <div class="mt-3">
                <a routerLink="/login" class="text-muted small">
                    <i class="bi bi-arrow-left me-1"></i>Back to Login
                </a>
            </div>
        </div>

    </div>
</div>

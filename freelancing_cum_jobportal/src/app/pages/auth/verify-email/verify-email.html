<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
    <div class="card shadow-sm border-0 text-center p-4 w-100" style="max-width: 400px; border-radius: 16px;">

        <!-- Success state -->
        <div *ngIf="verified">
            <div class="text-success mb-3" style="font-size: 64px;">
                <i class="bi bi-check-circle-fill"></i>
            </div>
            <h5 class="fw-bold">Email Verified!</h5>
            <p class="text-muted small">Redirecting to dashboard...</p>
        </div>

        <!-- Verify state -->
        <div *ngIf="!verified">
            <div class="text-primary mb-3" style="font-size: 48px;">
                <i class="bi bi-envelope-check"></i>
            </div>
            <h5 class="fw-bold">Verify Your Email</h5>
            <p class="text-muted small mb-4">We sent a 6-digit OTP to your email</p>

            <!-- OTP inputs -->
            <div class="d-flex justify-content-center gap-2 mb-4">
                <input *ngFor="let digit of otp; let i = index" [id]="'otp-' + i" type="text" maxlength="1"
                    class="form-control text-center fw-bold fs-5" style="width: 48px; height: 48px;" [value]="otp[i]"
                    (input)="onInput($event, i)" (keydown)="onKeydown($event, i)">
            </div>

            <div *ngIf="error" class="alert alert-danger py-2 small mb-3">{{ error }}</div>

            <button class="btn btn-primary w-100 mb-3" [disabled]="!otpComplete || loading" (click)="verify()">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                {{ loading ? 'Verifying...' : 'Verify Email' }}
            </button>

            <div class="text-muted small">
                Didn't receive it?
                <button class="btn btn-link btn-sm p-0" [disabled]="countdown > 0" (click)="resendOtp()">
                    {{ countdown > 0 ? 'Resend in ' + countdown + 's' : 'Resend OTP' }}
                </button>
            </div>

        </div>
    </div>
</div>

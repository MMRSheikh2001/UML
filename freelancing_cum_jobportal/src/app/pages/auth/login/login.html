<app-navbar></app-navbar>

<div class="min-vh-100 d-flex align-items-center justify-content-center"
    style="background: linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 100%); padding-top: 80px;">
    <div class="card shadow border-0 w-100" style="max-width: 440px; border-radius: 20px;">
        <div class="card-body p-5">

            <!-- Logo -->
            <div class="text-center mb-4">
                <div class="mb-3">
                    <i class="bi bi-briefcase-fill text-primary" style="font-size: 2.5rem;"></i>
                </div>
                <h4 class="fw-bold mb-1">Welcome Back</h4>
                <p class="text-muted small mb-0">Sign in to your WorkBridge account</p>
            </div>

            <!-- Error -->
            <div *ngIf="error" class="alert alert-danger py-2 small d-flex align-items-center gap-2 border-0 rounded-3">
                <i class="bi bi-exclamation-circle-fill"></i>{{ error }}
            </div>

            <form [formGroup]="form" (ngSubmit)="onSubmit()">

                <!-- Email -->
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0 bg-white">
                            <i class="bi bi-envelope text-muted"></i>
                        </span>
                        <input formControlName="email" type="email"
                            class="form-control border-start-0 ps-0"
                            [class.is-invalid]="f['email'].touched && f['email'].invalid"
                            placeholder="you@example.com">
                        <div class="invalid-feedback">Please enter a valid email.</div>
                    </div>
                </div>

                <!-- Password -->
                <div class="mb-4">
                    <label class="form-label small fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0 bg-white">
                            <i class="bi bi-lock text-muted"></i>
                        </span>
                        <input formControlName="password" [type]="showPassword ? 'text' : 'password'"
                            class="form-control border-start-0 border-end-0 ps-0"
                            [class.is-invalid]="f['password'].touched && f['password'].invalid"
                            placeholder="Your password">
                        <button class="btn btn-outline-secondary border-start-0" type="button"
                            (click)="showPassword = !showPassword">
                            <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
                        </button>
                        <div class="invalid-feedback">Password is required.</div>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold rounded-3" [disabled]="loading">
                    <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                    {{ loading ? 'Signing in...' : 'Sign In' }}
                </button>

            </form>

            <!-- Divider -->
            <div class="d-flex align-items-center my-3">
                <hr class="flex-grow-1"><span class="px-2 text-muted small">or</span><hr class="flex-grow-1">
            </div>

            <!-- Demo Accounts -->
            <div class="p-3 rounded-3 small" style="background: #f8f9ff; border: 1px solid #e0e7ff;">
                <div class="fw-semibold text-primary mb-2">
                    <i class="bi bi-info-circle me-1"></i>Demo Accounts
                </div>
                <div class="text-muted">
                    <div><strong>User:</strong> mahbub&#64;example.com / password123</div>
                    <div><strong>Admin:</strong> admin&#64;workbridge.com / admin123</div>
                </div>
            </div>

            <p class="text-center mt-3 small text-muted mb-0">
                Don't have an account?
                <a routerLink="/register" class="text-primary fw-semibold text-decoration-none">Create one free</a>
            </p>

        </div>
    </div>
</div>
